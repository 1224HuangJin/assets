<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stickers - 1224HuangJin</title>
    <meta name="description" content="个人GIF动图收藏库，快速查找与分享Discord表情、反应动图。">
    <meta name="generator" content="AI Generated">
    <style>
        :root {
            --bg: #0e0e10;
            --surface: rgba(255, 255, 255, 0.05);
            --surface-hover: rgba(255, 255, 255, 0.1);
            --text: #efeff1;
            --text-secondary: #adadb8;
            --accent: #a970ff;
            --accent-hover: #9147ff;
            --danger: #eb0400;
            --radius: 16px;
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            scroll-behavior: smooth; /* 平滑滚动 */
        }

        body.no-scroll {
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 1400px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #a970ff, #ff6b9d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.3rem;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1rem;
            margin-bottom: 0.5rem;
        }

        .stats {
            color: var(--text-secondary);
            font-size: 0.9rem;
            opacity: 0.8;
            background: rgba(169, 112, 255, 0.1);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            margin-top: 8px;
        }

        /* Toolbar */
        .toolbar {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-bottom: 2rem;
            align-items: center;
        }

        .search-box {
            width: 100%;
            max-width: 600px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 1rem 1.2rem 1rem 3rem;
            background: var(--surface);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            color: var(--text);
            font-size: 1.1rem;
            outline: none;
            transition: 0.3s;
        }

        .search-box input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(169, 112, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }

        .search-box .icon-search {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
            pointer-events: none;
        }

        .filter-area {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .tag-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            justify-content: center;
        }

        .tag {
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--text-secondary);
            user-select: none;
        }

        .tag.active,
        .tag:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
            box-shadow: 0 4px 12px rgba(169, 112, 255, 0.3);
            transform: translateY(-2px);
        }

        .reset-btn {
            background: rgba(235, 4, 0, 0.1);
            border: 1px solid rgba(235, 4, 0, 0.3);
            color: #ff6b6b;
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .reset-btn:hover {
            background: rgba(235, 4, 0, 0.2);
            color: white;
        }

        /* Gallery Grid */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
            width: 100%;
        }

        .card {
            background: var(--surface);
            backdrop-filter: blur(10px);
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow);
            border-color: rgba(169, 112, 255, 0.4);
        }

        .card.pulse {
            animation: pulse 0.4s ease;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .card-img-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #1a1a1d;
            padding: 0.5rem;
            cursor: zoom-in;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .card-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: transform 0.3s;
        }

        .card:hover .card-img {
            transform: scale(1.05);
        }

        .card-title {
            padding: 0.8rem 0.8rem 0;
            font-size: 0.9rem;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: center;
        }

        .card-body {
            padding: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card-body input {
            flex: 1;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid transparent;
            color: var(--text-secondary);
            padding: 0.6rem;
            border-radius: 8px;
            font-size: 0.8rem;
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
            transition: 0.2s;
        }

        .card-body input:hover {
            background: rgba(255, 255, 255, 0.12);
            color: white;
        }

        .copy-btn {
            background: var(--accent);
            border: none;
            color: white;
            padding: 0.6rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: 0.2s;
            white-space: nowrap;
        }

        .copy-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.05);
        }

        .copy-btn.copied {
            background: #00b894;
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            cursor: zoom-out;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .lightbox.active {
            display: flex;
            opacity: 1;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 80%;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            cursor: default;
            object-fit: contain;
            transform: scale(0.95);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .lightbox.active img {
            transform: scale(1);
        }

        .lightbox-close {
            position: absolute;
            top: 2rem;
            right: 2rem;
            color: white;
            font-size: 2.5rem;
            background: none;
            border: none;
            cursor: pointer;
            opacity: 0.7;
            transition: 0.2s;
        }

        .lightbox-close:hover {
            opacity: 1;
            transform: rotate(90deg);
        }

        /* Back to Top Button */
        #backToTop {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--accent);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
            z-index: 999;
        }

        #backToTop.visible {
            opacity: 1;
            pointer-events: auto;
        }

        #backToTop:hover {
            background: var(--accent-hover);
            transform: translateY(-5px);
        }

        /* Footer */
        .footer {
            margin-top: auto;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
            padding: 3rem 0 1rem 0;
            line-height: 1.8;
            opacity: 0.8;
        }

        .footer a {
            color: var(--accent);
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            body { padding: 1rem; }
            .header h1 { font-size: 2rem; }
            .search-box input { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>GIF Gallery</h1>
            <p>✨ 我的专属动图收藏库 · 点击图片放大 · 一键复制直链</p>
            <div class="stats" id="stats">努力加载中…</div>
        </header>

        <div class="toolbar">
            <div class="search-box">
                <span class="icon-search">🔍</span>
                <!-- 提示词修改，告知用户支持空格多词搜索 -->
                <input type="text" id="searchInput" placeholder="搜索关键词 (可用空格分隔，如: 可爱 猫)..." oninput="renderGallery()">
            </div>
            <div class="filter-area">
                <div class="tag-filter" id="tagContainer">
                    <span class="tag active" data-tag="all">全部</span>
                </div>
                <button class="reset-btn" id="resetFilters">↺ 重置筛选</button>
            </div>
        </div>

        <div class="gallery" id="gallery"></div>

        <footer class="footer">
            <p>© <span id="currentYear"></span> <span id="authorName">1224HuangJin</span>. 保留部分权利。</p>
            <p>本网站由 <strong>AI 生成</strong> · 代码基于 <a href="https://opensource.org/licenses/MIT" target="_blank">MIT 许可证</a> 开放使用</p>
            <p>GIF 内容版权归各自创作者所有，仅供个人收藏与分享。</p>
            <br>
            <p><a href= "https://github.com/1224HuangJin/assets/images/stickers">在GitHub上查看</a></p>
        </footer>
    </div>

    <!-- Lightbox Preview -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <button class="lightbox-close">&times;</button>
        <img src="" alt="预览" id="lightboxImg">
    </div>

    <!-- Back to Top -->
    <button id="backToTop" onclick="scrollToTop()" title="回到顶部">↑</button>

    <script>
        // =============================================
        // 🔧 核心配置区
        // =============================================
        const repoOwner = "1224HuangJin";          
        const repoName = "assets";                 
        const gifFolder = "images/stickers";       
        const branch = "main";

        document.getElementById('authorName').textContent = repoOwner;
        document.getElementById('currentYear').textContent = new Date().getFullYear();

        // 🌟 核心优化：专门为你定制的中文标签库
        // 只要你的文件名里包含后面数组里的任何一个词，就会被自动打上前方的标签！
        const customTags = {
            "可爱/萌": ["可爱", "傲娇", "害羞", "奶龙", "少女", "夸"],
            "猫猫": ["猫", "喵"],
            "开心/笑": ["笑", "哈哈", "嘿嘿", "哼", "开心"],
            "震惊/无语": ["震惊", "无语", "额", "问号", "慌", "扯"],
            "生气/破防": ["气", "急", "哭", "烦", "打架", "敲锤"],
            "吃东西": ["吃", "蛋糕", "煎饼", "香蕉", "瓶子"]
        };

        let allPics = [];
        let activeTag = "all";

        // 获取指定目录下的图片列表
        async function loadImages() {
            try {
                const apiUrl = `https://api.github.com/repos/${repoOwner}/${repoName}/git/trees/${branch}:${gifFolder}?recursive=1`;
                const res = await fetch(apiUrl);    
                if (!res.ok) throw new Error("API 请求失败");
                const data = await res.json();

                allPics = data.tree
                    .filter(file => file.type === 'blob' && /\.(gif|png|jpg|jpeg|webp)$/i.test(file.path))
                    .map(file => {
                        const url = `https://raw.githubusercontent.com/${repoOwner}/${repoName}/${branch}/${gifFolder}/${file.path}`;
                        const filename = file.path.split('/').pop();
                        const lowerName = filename.toLowerCase();
                        
                        // 自动匹配标签
                        let tags = [];
                        for (const [label, keywords] of Object.entries(customTags)) {
                            if (keywords.some(kw => lowerName.includes(kw.toLowerCase()))) {
                                tags.push(label);
                            }
                        }
                        
                        // 如果没有匹配到任何标签，则放入"其他"
                        if (tags.length === 0) {
                            tags.push("其他");
                        }

                        // 清除文件后缀名，方便页面展示名称
                        const cleanName = filename.replace(/\.(gif|png|jpg|jpeg|webp)$/i, '');

                        return { ...file, url, filename, cleanName, tags };
                    });

                updateStats();
                generateTagButtons();
                renderGallery();
            } catch (error) {
                console.error(error);
                document.getElementById('gallery').innerHTML = `
                    <p style="grid-column:1/-1;text-align:center;color:var(--danger);font-size:1.2rem;">
                        ⚠️ 加载失败，请确保仓库公开且路径 <strong>${repoOwner}/${repoName}/${gifFolder}</strong> 正确。
                    </p>`;
                document.getElementById('stats').textContent = '加载失败';
            }
        }

        function updateStats() {
            document.getElementById('stats').textContent = `已收录 ${allPics.length} 个表情包`;
        }

        // 生成分类标签按钮
        function generateTagButtons() {
            const allTags = new Set(["all"]);
            // 确保我们按照自定义标签的顺序显示，最后显示"其他"
            Object.keys(customTags).forEach(tag => allTags.add(tag));
            allTags.add("其他");

            const tagContainer = document.getElementById('tagContainer');
            tagContainer.innerHTML = '<span class="tag active" data-tag="all">全部</span>';
            
            allTags.forEach(tag => {
                if (tag === "all") return;
                
                // 检查该标签下是否有图片，如果有才显示该标签按钮
                const hasImages = allPics.some(p => p.tags.includes(tag));
                if (!hasImages) return;

                const span = document.createElement('span');
                span.className = 'tag';
                span.dataset.tag = tag;
                span.textContent = tag;
                span.addEventListener('click', (e) => {
                    activeTag = e.target.dataset.tag;
                    document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
                    e.target.classList.add('active');
                    renderGallery();
                });
                tagContainer.appendChild(span);
            });

            document.querySelector('[data-tag="all"]').addEventListener('click', (e) => {
                activeTag = "all";
                document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
                renderGallery();
            });
        }

        // 渲染图库视图 (支持多关键词搜索)
        function renderGallery() {
            const searchInput = document.getElementById('searchInput').value.toLowerCase().trim();
            const searchTerms = searchInput.split(/\s+/).filter(term => term.length > 0); // 用空格分割搜索词

            let filtered = allPics.filter(pic => {
                // 将文件名和标签组合起来进行搜索匹配
                const textToSearch = (pic.filename + " " + pic.tags.join(" ")).toLowerCase();
                
                // 必须满足所有用空格隔开的搜索词
                const matchSearch = searchTerms.every(term => textToSearch.includes(term));
                const matchTag = activeTag === "all" || pic.tags.includes(activeTag);
                
                return matchSearch && matchTag;
            });

            const gallery = document.getElementById('gallery');
            if (filtered.length === 0) {
                gallery.innerHTML = `
                    <div style="grid-column:1/-1; text-align:center; padding: 3rem 0;">
                        <div style="font-size: 3rem; margin-bottom: 1rem;">🤔</div>
                        <p style="color:var(--text-secondary); font-size: 1.1rem;">没有找到相关的表情包，换个关键词试试吧！</p>
                    </div>`;
                return;
            }

            gallery.innerHTML = filtered.map(pic => `
                <div class="card" id="card-${pic.url}">
                    <div class="card-img-container" onclick="openLightbox(event, '${pic.url}')">
                        <img class="card-img" src="${pic.url}" loading="lazy" alt="${pic.filename}">
                    </div>
                    <div class="card-title" title="${pic.cleanName}">${pic.cleanName}</div>
                    <div class="card-body">
                        <input type="text" value="${pic.url}" readonly onclick="this.select()" title="点击全选链接">
                        <button class="copy-btn" onclick="copyToClipboard('${pic.url}', this, '${pic.url}')">复制</button>
                    </div>
                </div>
            `).join('');
        }

        // 复制功能
        function copyToClipboard(text, btn, cardIdentifier) {
            const fallbackCopy = (str) => {
                const textarea = document.createElement('textarea');
                textarea.value = str;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    document.execCommand('copy');
                    return true;
                } catch (e) {
                    return false;
                } finally {
                    document.body.removeChild(textarea);
                }
            };

            const success = () => {
                const originalText = btn.textContent;
                btn.textContent = '已复制! ✓';
                btn.classList.add('copied');
                
                const card = document.querySelector(`.card:has(button[onclick*="${cardIdentifier}"])`);
                if (card) {
                    card.classList.add('pulse');
                    setTimeout(() => card.classList.remove('pulse'), 400);
                }
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.classList.remove('copied');
                }, 2000);
            };

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(success).catch(() => {
                    if (fallbackCopy(text)) success();
                    else alert('复制失败，请手动复制');
                });
            } else {
                if (fallbackCopy(text)) success();
                else alert('复制失败，请手动复制');
            }
        }

        // 放大预览 Lightbox
        function openLightbox(event, url) {
            event.stopPropagation();
            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('lightboxImg');
            img.src = url;
            lightbox.classList.add('active');
            document.body.classList.add('no-scroll');
        }

        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.remove('active');
            setTimeout(() => { document.getElementById('lightboxImg').src = ''; }, 300); // 等待动画完成
            document.body.classList.remove('no-scroll');
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLightbox();
        });

        // 重置所有筛选
        document.getElementById('resetFilters').addEventListener('click', () => {
            document.getElementById('searchInput').value = '';
            activeTag = 'all';
            document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
            document.querySelector('[data-tag="all"]').classList.add('active');
            renderGallery();
        });

        // 返回顶部逻辑
        window.addEventListener('scroll', () => {
            const btn = document.getElementById('backToTop');
            if (window.scrollY > 300) {
                btn.classList.add('visible');
            } else {
                btn.classList.remove('visible');
            }
        });

        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 启动
        loadImages();
    </script>
</body>
</html>
