    <style>
        :root {

            --surface: rgba(255, 255, 255, 0.05);

            --text: #efeff1;

        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        body.no-scroll {
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 1400px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #a970ff, #ff6b9d);

            -webkit-text-fill-color: transparent;

        .header p {
            color: var(--text-secondary);

        .stats {
            color: var(--text-secondary);

        }

        /* Toolbar */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            justify-content: center;
            align-items: center;
        }

        .search-box {
            flex: 1 1 300px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 0.9rem 1.2rem 0.9rem 2.8rem;
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.1);

        .tag-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            align-items: center;
        }

        .tag {
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text-secondary);
            user-select: none;
        }

        .tag.active,
        .tag:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
            box-shadow: 0 0 12px rgba(169, 112, 255, 0.4);
        }

        .reset-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-secondary);
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .reset-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: white;
        }

        /* Gallery Grid */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .card {
            background: var(--surface);
            backdrop-filter: blur(10px);
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .card.pulse {
            animation: pulse 0.4s ease;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        .card-img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: contain;
            background: #1a1a1d;
            padding: 0.5rem;
        }

        .card-body {
            padding: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card-body input {
            flex: 1;
            background: rgba(255, 255, 255, 0.08);
            border: none;
            color: var(--text);
            padding: 0.5rem;
            border-radius: 8px;
            font-size: 0.8rem;
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .copy-btn {
            background: var(--accent);
            border: none;
            color: white;
            padding: 0.5rem 0.75rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: 0.2s;
            white-space: nowrap;
        }

        .copy-btn:hover {
            background: var(--accent-hover);
        }

        .copy-btn.copied {
            background: #00b894;
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            cursor: zoom-out;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 80%;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            cursor: default;
            object-fit: contain;
        }

        .lightbox-close {
            position: absolute;
            top: 2rem;
            right: 2rem;
            color: white;
            font-size: 2rem;
            background: none;
            border: none;
            cursor: pointer;
            opacity: 0.7;
            transition: 0.2s;
        }

        .lightbox-close:hover {
            opacity: 1;
        }

        /* Footer */
        .footer {
            margin-top: auto;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.8rem;
            padding: 2rem 0;
            line-height: 1.8;
            opacity: 0.8;
        }

        .footer a {
            color: var(--accent);
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            body {
                padding: 1rem;
            }

            .card-body {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>GIF Gallery</h1>
            <p>✨ 我的专属动图收藏库 · 点击图片放大 · 一键复制Discord链接</p>
            <div class="stats" id="stats">加载中…</div>
        </header>

        <div class="toolbar">
            <div class="search-box">
                <span class="icon-search">🔍</span>
                <input type="text" id="searchInput" placeholder="搜索文件名、标签..." oninput="renderGallery()">
            </div>
            <div class="tag-filter" id="tagContainer">
                <span class="tag active" data-tag="all">全部</span>
            </div>
            <button class="reset-btn" id="resetFilters">↺ 重置</button>
        </div>

        <div class="gallery" id="gallery"></div>

        <footer class="footer">
            <p>© <span id="currentYear"></span> <span id="authorName">1224HuangJin</span>. 保留部分权利。</p>
            <p>本网站由 <strong>AI 生成</strong> (DeepSeek) · 代码基于 <a href="https://opensource.org/licenses/MIT" target="_blank">MIT 许可证</a> 开放使用</p>
            <p>GIF 内容版权归各自创作者所有，仅供个人收藏与分享。</p>
        </footer>
    </div>

    <!-- Lightbox Preview -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <button class="lightbox-close">&times;</button>
        <img src="" alt="预览" id="lightboxImg">
    </div>

    <script>
        // =============================================
        // 🔧 必须修改：你的 GitHub 用户名、仓库名及 GIF 子目录
        // =============================================
        const repoOwner = "1224HuangJin";          // 你的 GitHub 用户名
        const repoName = "assets";           // 你的仓库名
        const gifFolder = "images/stickers";     // GIF 所在的子目录路径
        const branch = "main";

        // 作者署名（显示在页脚）
        const displayAuthor = "1224HuangJin";
        document.getElementById('authorName').textContent = displayAuthor;
        document.getElementById('currentYear').textContent = new Date().getFullYear();

        // 标签映射（关键词 -> 显示标签名）
        const customTags = {
            "happy": ["happy", "smile", "joy", "开心"],
            "angry": ["angry", "mad", "生气"],
            "cat": ["cat", "猫咪", "猫"],
            "dance": ["dance", "跳舞", "舞蹈"],
            "reaction": ["react", "反应", "meme"],
        };

        let allPics = [];
        let activeTag = "all";

        // 获取指定目录下的图片列表（利用 GitHub API）
        async function loadImages() {
            try {
                // 使用指定路径的树 API，避免加载整个仓库
                const apiUrl = `https://api.github.com/repos/${repoOwner}/${repoName}/git/trees/${branch}:${gifFolder}?recursive=1`;
                const res = await fetch(apiUrl);    
                if (!res.ok) throw new Error("API 请求失败");
                const data = await res.json();

                allPics = data.tree
                    .filter(file => file.type === 'blob' && /\.(gif|png|jpg|jpeg|webp)$/i.test(file.path))
                    .map(file => {
                        const url = `https://raw.githubusercontent.com/${repoOwner}/${repoName}/${branch}/${gifFolder}/${file.path}`;
                        const filename = file.path.split('/').pop();
                        const lowerName = filename.toLowerCase();
                        // 自动匹配标签
                        let tags = [];
                        for (const [label, keywords] of Object.entries(customTags)) {
                            if (keywords.some(kw => lowerName.includes(kw.toLowerCase()))) {
                                tags.push(label);
                            }
                        }
                        return { ...file, url, filename, tags };
                    });

                // 如果是空列表也显示统计信息
                updateStats();
                generateTagButtons();
                renderGallery();
            } catch (error) {
                console.error(error);
                document.getElementById('gallery').innerHTML = `
                    <p style="grid-column:1/-1;text-align:center;color:var(--danger);">
                        ⚠️ 加载失败，请确保仓库公开且路径 <strong>${repoOwner}/${repoName}/${gifFolder}</strong> 正确。
                    </p>`;
                document.getElementById('stats').textContent = '';
            }
        }

        function updateStats() {
            document.getElementById('stats').textContent = `共 ${allPics.length} 个动图`;
        }

        function generateTagButtons() {
            const allTags = new Set(["all"]);
            allPics.forEach(p => p.tags.forEach(t => allTags.add(t)));
            const tagContainer = document.getElementById('tagContainer');
            tagContainer.innerHTML = '<span class="tag active" data-tag="all">全部</span>';
            allTags.forEach(tag => {
                if (tag === "all") return;
                const span = document.createElement('span');
                span.className = 'tag';
                span.dataset.tag = tag;
                span.textContent = `#${tag}`;
                span.addEventListener('click', (e) => {
                    activeTag = e.target.dataset.tag;
                    document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
                    e.target.classList.add('active');
                    renderGallery();
                });
                tagContainer.appendChild(span);
            });
            document.querySelector('[data-tag="all"]').addEventListener('click', (e) => {
                activeTag = "all";
                document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
                renderGallery();
            });
        }

        function renderGallery() {
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            let filtered = allPics.filter(pic => {
                const matchSearch = pic.filename.toLowerCase().includes(searchText) ||
                                  pic.path.toLowerCase().includes(searchText);
                const matchTag = activeTag === "all" || pic.tags.includes(activeTag);
                return matchSearch && matchTag;
            });

            const gallery = document.getElementById('gallery');
            if (filtered.length === 0) {
                gallery.innerHTML = `<p style="grid-column:1/-1; text-align:center; color:var(--text-secondary);">没有找到匹配的 GIF，换个词试试~</p>`;
                return;
            }

            gallery.innerHTML = filtered.map(pic => `
                <div class="card" id="card-${pic.url}">
                    <img class="card-img" src="${pic.url}" loading="lazy" alt="${pic.filename}"
                         onclick="openLightbox(event, '${pic.url}')">
                    <div class="card-body">
                        <input type="text" value="${pic.url}" readonly onclick="this.select()" title="Discord直链">
                        <button class="copy-btn" onclick="copyToClipboard('${pic.url}', this, '${pic.url}')">复制</button>
                    </div>
                </div>
            `).join('');
        }

        function copyToClipboard(text, btn, cardIdentifier) {
            const fallbackCopy = (str) => {
                const textarea = document.createElement('textarea');
                textarea.value = str;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    document.execCommand('copy');
                    return true;
                } catch (e) {
                    return false;
                } finally {
                    document.body.removeChild(textarea);
                }
            };

            const success = () => {
                btn.textContent = '已复制!';
                btn.classList.add('copied');
                // 找到对应的卡片添加脉冲动画
                const card = document.querySelector(`.card:has(button[onclick*="${cardIdentifier}"])`);
                if (card) {
                    card.classList.add('pulse');
                    setTimeout(() => card.classList.remove('pulse'), 400);
                }
                setTimeout(() => {
                    btn.textContent = '复制';
                    btn.classList.remove('copied');
                }, 1500);
            };

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(success).catch(() => {
                    if (fallbackCopy(text)) success();
                    else alert('复制失败，请手动复制');
                });
            } else {
                if (fallbackCopy(text)) success();
                else alert('复制失败，请手动复制');
            }
        }

        // 放大预览 Lightbox
        function openLightbox(event, url) {
            event.stopPropagation();
            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('lightboxImg');
            img.src = url;
            lightbox.classList.add('active');
            document.body.classList.add('no-scroll');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.getElementById('lightboxImg').src = '';
            document.body.classList.remove('no-scroll');
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLightbox();
        });

        // 重置所有筛选
        document.getElementById('resetFilters').addEventListener('click', () => {
            document.getElementById('searchInput').value = '';
            activeTag = 'all';
            document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
            document.querySelector('[data-tag="all"]').classList.add('active');
            renderGallery();
        });

        // 启动
        loadImages();
    </script>
</body>
</html>
